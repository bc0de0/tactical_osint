site_name: Tactical OSINT
site_description: A public intelligence knowledge base for OSINT, GEOINT, verification, and adversarial analysis.
site_url: https://intel.hexdefender.com
repo_url: https://github.com/bc0de0/tactical_osint
repo_name: bc0de0/tactical_osint
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

hooks:
  - hooks/report_pdf_export.py

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/favicon.png

  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - header.autohide

  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      tip: octicons/squirrel-16
      warning: octicons/alert-16
      danger: octicons/stop-16

plugins:
  - search:
      lang: en
  - blog:
      blog_dir: reports
      post_url_format: "{slug}"
      post_date_format: long
      archive: true
      archive_date_format: yyyy
      categories: true
      categories_allowed:
        - Cyber
        - Military
        - Maritime
        - Airpower
        - Space
        - Energy
        - Logistics
        - Industrial
        - Economic
        - Political
        - Information Operations
        - Intelligence
      pagination: true
      pagination_per_page: 10
  - tags:
      tags_file: tags.md
      # NOTE: mkdocs-material >=9.6 deprecates `tags_file` in favor of a
      # different option name; this repo currently pins >=9.5.0 and the
      # site already used this key before this change, so it is left
      # as-is rather than changed as a drive-by fix. Flagged here for
      # whoever next bumps mkdocs-material materially past 9.5.x.

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bc0de0/tactical_osint
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

nav:
  - Home: index.md
  - Reports: reports/index.md
  - Methodology:
    - methodology/index.md
    - What is OSINT: methodology/what-is-osint.md
  - OSINT:
    - osint/index.md
    - Search Operators: osint/search-operators.md
    - Social Media: osint/social-media.md
    - Username Recon: osint/username-recon.md
    - Email Recon: osint/email-recon.md
  - GEOINT:
    - geoint/index.md
    - Imagery Analysis: geoint/imagery-analysis.md
    - Geolocation: geoint/geolocation.md
    - Satellite Sources: geoint/satellite-sources.md
  - Verification:
    - verification/index.md
    - Image Verification: verification/image-verification.md
    - Video Verification: verification/video-verification.md
    - Source Credibility: verification/source-credibility.md
  - Adversarial Analysis:
    - adversarial/index.md
    - Threat Actor Profiling: adversarial/threat-actor-profiling.md
    - Disinformation: adversarial/disinformation.md
    - Infrastructure Analysis: adversarial/infrastructure-analysis.md
  - Tools:
    - tools/index.md
    - Shodan: tools/shodan.md
  - Tags: tags.md
